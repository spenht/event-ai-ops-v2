name: Daily Followups

on:
  schedule:
    - cron: "0 16 * * *" # 16:00 UTC (ajstalo)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call followups endpoint
        run: |
          curl -sS -X POST "https://calls-mx.fly.dev/v1/automation/followups?days=1" \
            -H "Accept: application/json" \
            -H "X-Cron-Token: ${{ secrets.CRON_TOKEN }}"
