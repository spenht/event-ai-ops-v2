name: Followups Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call followups endpoint
        run: |
          curl -sS -X POST "https://calls-mx.fly.dev/v1/automation/followups" \
            -H "Accept: application/json" \
            -H "X-Cron-Token: ${{ secrets.CRON_TOKEN }}"
